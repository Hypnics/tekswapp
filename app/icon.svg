<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">TekSwapp icon</title>
  <desc id="desc">Circular blue and teal icon with two swap arrows and circuit lines.</desc>
  <defs>
    <linearGradient id="bg" x1="34" y1="24" x2="214" y2="226" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1E4C8E" />
      <stop offset="0.52" stop-color="#0D214B" />
      <stop offset="1" stop-color="#1ED3BE" />
    </linearGradient>
    <radialGradient id="shine" cx="0" cy="0" r="1" gradientTransform="translate(80 46) rotate(36) scale(132 118)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#66F0DF" stop-opacity="0.36" />
      <stop offset="1" stop-color="#66F0DF" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="arrow" x1="42" y1="42" x2="221" y2="188" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2DA4FF" />
      <stop offset="0.5" stop-color="#52F1DF" />
      <stop offset="1" stop-color="#7AF6D7" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <circle cx="128" cy="128" r="122" fill="url(#bg)" />
  <circle cx="128" cy="128" r="122" fill="url(#shine)" />

  <g filter="url(#softGlow)" fill="none" stroke="url(#arrow)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M36 112C34 64 79 34 139 34c29 0 55 7 78 23" stroke-width="20" />
    <path d="M219 57l-28-15 2 32" stroke-width="20" />

    <path d="M220 98c6 48-39 84-99 84-29 0-56-7-80-24" stroke-width="20" />
    <path d="M41 160l28 17-4-32" stroke-width="20" />
  </g>

  <g fill="none" stroke="url(#arrow)" stroke-linecap="round">
    <path d="M42 188c42 18 94 19 149-7" stroke-width="7" opacity="0.7" />
    <path d="M34 204c49 24 111 25 184-8" stroke-width="7" opacity="0.48" />
    <path d="M54 172c31 13 71 13 108 1" stroke-width="6" opacity="0.38" />
  </g>

  <g fill="#7AF6D7">
    <circle cx="117" cy="179" r="7" />
    <circle cx="82" cy="191" r="7" />
    <circle cx="182" cy="167" r="7" />
    <circle cx="213" cy="149" r="9" />
  </g>

  <circle cx="128" cy="128" r="122" fill="none" stroke="rgba(255,255,255,0.12)" />
</svg>
